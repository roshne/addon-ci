name: lua-test

# Reusable CI for WoW addon repos. Callers reference this with:
#
#   jobs:
#     ci:
#       uses: roshne/addon-ci/.github/workflows/lua-test.yml@main
#
# It lints every repo with luacheck (Lua 5.1, matching WoW's interpreter) and
# runs busted only when the repo actually has specs — so a one-file addon stays
# green with no config, and tests start running automatically once a .busted
# file or any spec/ dir appears.
on:
  workflow_call:

jobs:
  luacheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # WoW's interpreter is Lua 5.1-based — lint on the same version.
      - uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1.5"

      - uses: leafo/gh-actions-luarocks@v4

      - name: Install luacheck
        run: luarocks install luacheck

      - name: Run luacheck
        run: luacheck . --codes

  busted:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Run busted only if the repo has specs (a .busted file or any spec/ dir),
      # so addons with no pure-Lua tests stay green and start testing
      # automatically once specs exist.
      - name: Detect specs
        id: specs
        run: |
          if [ -f .busted ] || find . -path '*/spec/*' -name '*.lua' -print -quit | grep -q .; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "No busted specs found — skipping unit tests."
          fi

      - uses: leafo/gh-actions-lua@v10
        if: steps.specs.outputs.have == 'true'
        with:
          luaVersion: "5.1.5"

      - uses: leafo/gh-actions-luarocks@v4
        if: steps.specs.outputs.have == 'true'

      - name: Install busted
        if: steps.specs.outputs.have == 'true'
        run: luarocks install busted

      - name: Run unit tests
        if: steps.specs.outputs.have == 'true'
        run: busted --output=utfTerminal
